<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LNT Paris - Gestion de Stand</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    h1 {
      margin: 0 0 20px 0;
      color: #333;
    }
    p {
      margin: 0 0 20px 0;
      color: #666;
    }
    a {
      display: inline-block;
      padding: 10px 20px;
      background: #C9AD71;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    a:hover {
      background: #b39a5d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LNT Paris - Gestion de Stand</h1>
    <p>Scan this with Expo Go or open on a mobile device</p>
    <p><strong>Loading app...</strong></p>
    <script>
      // Try to find and open the latest build
      fetch('.')
        .then(r => r.text())
        .then(html => {
          // Look for timestamp directories
          const matches = html.match(/href="(\d+-\d+)"/);
          if (matches && matches[1]) {
            window.location.href = `./${matches[1]}/`;
          }
        })
        .catch(() => {
          document.querySelector('p:last-of-type').innerHTML = 'Please wait a moment and refresh...';
        });
    </script>
  </div>
</body>
</html>
